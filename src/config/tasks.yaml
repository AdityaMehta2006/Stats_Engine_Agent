# Task definitions for the Stat Engine pipeline.
# Tasks execute sequentially; each task's output feeds as context to the next.

schema_analysis:
  description: >
    Analyze the CSV file at '{csv_path}'.
    Use the CSV Reader tool to extract the full schema: column names, data types,
    null counts, unique value counts, sample values, and summary statistics.
    Determine the domain of the data (e.g., finance, healthcare, survey, sales).
    Flag any potential issues: columns with >30% nulls, mixed data types,
    suspicious patterns (e.g., IDs stored as floats, dates as strings).
    Provide a clear summary and specific cleaning recommendations.
  expected_output: >
    A comprehensive JSON schema report including:
    - filename, row_count, column_count
    - For each column: name, inferred type, null_count, unique_count, sample_values
    - Data domain classification
    - List of issues found
    - Specific cleaning recommendations for each problematic column
  agent: schema_analyst

data_cleaning:
  description: >
    Clean the CSV file at '{csv_path}' based on the schema analysis findings.
    Use the Data Cleaner tool with appropriate instructions:
    - Handle nulls as recommended (median for numeric, mode for categorical, drop if >50% null)
    - Remove duplicate rows
    - Fix data type issues identified in the schema analysis
    - Remove outliers from numeric columns where appropriate (using IQR method)
    The instructions must be a valid JSON string matching the tool's expected format.
  expected_output: >
    A JSON cleaning report including:
    - Path to the cleaned CSV file
    - Rows before and after cleaning
    - Details of all transformations applied
    - Any columns dropped and why
  agent: data_cleaner

database_loading:
  description: >
    Design a relational schema for the cleaned data at '{cleaned_csv_path}'.
    Analyze the column relationships and decide if normalization makes sense:
    - If there are repeated entity groups (e.g., customer info repeated across rows),
      consider splitting into separate tables with foreign keys.
    - If the data is already flat and simple, use a single table.
    - Do NOT over-normalize — keep it practical.
    Use the MySQL Schema Designer tool to create the database and load the data.
    Provide the schema design as a JSON string with table definitions.
  expected_output: >
    A JSON result including:
    - Database name created
    - List of tables with their columns and row counts
    - Design rationale explaining the schema choices
  agent: db_architect

statistical_analysis:
  description: >
    Run statistical tests on the cleaned data at '{cleaned_csv_path}'.
    Use the Statistical Tests tool to automatically run appropriate tests.
    Review the results and provide interpretations:
    - For each significant finding, explain what it means practically
    - For non-significant results, note that no evidence was found
    - Comment on effect sizes where relevant
    - Recommend specific chart types that would best visualize the key findings
    Include chart recommendations as a list of chart specifications.
  expected_output: >
    A detailed JSON analysis including:
    - Data classification (numeric, categorical, mixed)
    - Normality test results for each numeric column
    - Descriptive statistics
    - All statistical test results with p-values and interpretations
    - Chart recommendations with specific column mappings
  agent: statistical_analyst

statistical_analysis_regression:
  description: >
    Run a comprehensive linear regression analysis on the cleaned data at '{cleaned_csv_path}'.
    Use the Regression Analysis tool to fit an OLS model.

    You MUST systematically answer ALL of the following questions in your analysis:

    Q1. DATASET DESCRIPTION: Briefly describe the dataset — number of observations,
        number of variables, types of variables (numeric vs categorical), and the
        data domain.

    Q2. DEPENDENT VARIABLE SELECTION: Identify the most suitable dependent variable
        for regression analysis. Justify your choice with reasoning based on the
        data context and domain knowledge.

    Q3. INDEPENDENT VARIABLE SELECTION: Identify one or more independent variables
        that may influence the dependent variable. Provide reasoning for each
        selection based on domain knowledge, correlation analysis, and statistical
        significance.

    Q4. RELATIONSHIP EXPLORATION: Explore the relationships between variables using
        appropriate summary statistics (means, medians, correlations) and describe
        what visualizations would best show these relationships (scatter plots,
        correlation heatmaps, etc.).

    Q5. MODEL SPECIFICATION AND ESTIMATION: Specify the regression model equation
        (Y = β₀ + β₁X₁ + β₂X₂ + ... + ε). Report all OLS estimation results
        including R², Adjusted R², F-statistic, and individual coefficient estimates.

    Q6. COEFFICIENT INTERPRETATION: Interpret EACH estimated coefficient in the
        context of the data. For example: "A one-unit increase in X is associated
        with a β change in Y, holding other variables constant."

    Q7. MODEL FIT EVALUATION: Evaluate overall model fit using R², Adjusted R²,
        F-statistic and its p-value, AIC, and BIC. Comment on what percentage of
        variance in the dependent variable is explained by the model.

    Q8. RESIDUAL ANALYSIS: Perform a thorough residual analysis covering ALL of:
        a) Residuals vs Fitted values — describe any patterns (should be random)
        b) Whether residuals are randomly distributed around zero
        c) Heteroscedasticity assessment — Breusch-Pagan test results and interpretation
        d) Normality of residuals — QQ plot interpretation, Jarque-Bera test results,
           histogram shape assessment
        Also report: Durbin-Watson statistic for autocorrelation, ACF/PACF analysis,
        and VIF scores for multicollinearity.

    Q9. MODEL APPROPRIATENESS AND IMPROVEMENTS: Based on ALL findings above, discuss:
        - Is the linear model appropriate for this data?
        - Which assumptions are met vs violated?
        - Specific suggestions for improvement (e.g., removing high-VIF predictors,
          transforming variables, trying non-linear models, adding interaction terms,
          dropping insignificant predictors)

  expected_output: >
    A comprehensive structured analysis that answers ALL 9 questions above, including:
    - Dataset description with variable counts and types
    - Justified dependent and independent variable selections
    - Full OLS model results (R², coefficients, p-values, confidence intervals)
    - Contextual coefficient interpretations
    - Complete residual diagnostics (Durbin-Watson, Jarque-Bera, Breusch-Pagan, VIF)
    - ACF/PACF analysis results
    - Clear assessment of model appropriateness with specific improvement recommendations
  agent: statistical_analyst

report_generation:
  description: >
    Generate a comprehensive analysis report and visualizations.
    First, use the Chart Generator tool to create the charts recommended by the
    Statistical Analyst. The chart instructions should be a JSON string with the
    recommended chart specifications.
    Then compile everything into a polished Markdown report with these sections:
    1. Executive Summary (2-3 sentences of key findings)
    2. Data Overview (source, shape, domain)
    3. Data Cleaning Summary (what was fixed and why)
    4. Database Schema (tables created and rationale)
    5. Statistical Analysis (test results with plain-language interpretations)
    6. Visualizations (embedded chart images with descriptions)
    7. Conclusions and Recommendations
    Save the report as a Markdown file in the outputs directory.
  expected_output: >
    A complete Markdown report string that includes all sections listed above,
    with embedded chart image paths and clear interpretations of all findings.
  agent: report_generator

report_generation_regression:
  description: >
    Generate a comprehensive LINEAR REGRESSION analysis report with visualizations.
    Compile the Statistical Analyst's regression findings into a professionally
    structured Markdown report that answers the following questions IN ORDER:

    The report MUST have these sections:

    ## 1. Executive Summary
    2-3 sentences summarizing the key regression findings, model quality, and main takeaways.

    ## 2. Dataset Description
    Number of observations, variables, variable types, data domain. (Answers Q1)

    ## 3. Variable Selection
    ### 3a. Dependent Variable
    Which variable was chosen as Y and why. (Answers Q2)
    ### 3b. Independent Variables
    Which variables were chosen as predictors and the reasoning. (Answers Q3)

    ## 4. Exploratory Analysis
    Key summary statistics, correlation findings, and relationship patterns.
    Describe what the charts show. (Answers Q4)

    ## 5. Regression Model
    ### 5a. Model Specification
    Write out the model equation: Y = β₀ + β₁X₁ + ... (Answers Q5)
    ### 5b. Coefficient Interpretation
    Interpret each coefficient in plain language with context. (Answers Q6)
    ### 5c. Model Fit
    R², Adjusted R², F-statistic, AIC, BIC with interpretation. (Answers Q7)

    ## 6. Residual Analysis
    ### 6a. Residuals vs Fitted Values
    Pattern analysis — is the scatter random? (Answers Q8a)
    ### 6b. Residual Distribution
    Are residuals centered around zero? (Answers Q8b)
    ### 6c. Heteroscedasticity
    Breusch-Pagan test results and interpretation. (Answers Q8c)
    ### 6d. Normality of Residuals
    QQ plot analysis, Jarque-Bera results, histogram assessment. (Answers Q8d)
    ### 6e. Autocorrelation
    Durbin-Watson statistic, ACF/PACF patterns.
    ### 6f. Multicollinearity
    VIF scores for each predictor with interpretation.

    ## 7. Model Assessment & Recommendations
    Is the model appropriate? Which assumptions hold? Specific improvement suggestions. (Answers Q9)

    ## 8. Data Cleaning & Database Notes
    Brief summary of cleaning steps and schema design.

  expected_output: >
    A complete, well-structured Markdown report that systematically answers all 9
    regression analysis questions with clear section headers, statistical evidence,
    plain-language interpretations, and actionable recommendations. The report should
    be understandable by both technical and non-technical stakeholders.
  agent: report_generator

